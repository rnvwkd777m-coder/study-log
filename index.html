<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f7f9fa; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-800">My Study Log</h1>
        <div class="flex space-x-3 items-center">
            <button onclick="exportData()" class="text-xs text-slate-500 hover:text-blue-500" title="バックアップを保存"><i class="fa-solid fa-download"></i></button>
            <label class="cursor-pointer text-xs text-slate-500 hover:text-blue-500" title="データを復元">
                <i class="fa-solid fa-upload"></i>
                <input type="file" accept=".json" class="hidden" onchange="importData(event)">
            </label>
            <span class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-full font-mono" id="today-date"></span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">

        <div id="tab-timeline" class="tab-content active space-y-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <textarea id="log-comment" placeholder="今の意気込みや振り返りをメモ..." class="w-full p-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" rows="2"></textarea>
                <div class="flex space-x-2 mt-2">
                    <select id="log-subject" class="text-sm border rounded px-2 py-1 bg-slate-50 flex-1"></select>
                    <input type="number" id="log-duration" placeholder="分" class="text-sm border rounded px-2 py-1 w-20 text-center">
                    <button onclick="addManualLog()" class="bg-blue-500 text-white text-sm px-4 py-1 rounded-lg font-bold hover:bg-blue-600">記録</button>
                </div>
            </div>
            <div id="timeline-feed" class="space-y-3"></div>
        </div>

        <div id="tab-timer" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm text-center">
                <div class="flex justify-center space-x-2 mb-6">
                    <button onclick="setTimerMode('stopwatch')" id="btn-mode-sw" class="px-3 py-1 text-xs rounded-full font-bold bg-blue-500 text-white shadow-sm transition-colors">ストップウォッチ</button>
                    <button onclick="setTimerMode('pomodoro')" id="btn-mode-pomo" class="px-3 py-1 text-xs rounded-full font-bold bg-slate-100 text-slate-600 shadow-sm transition-colors">ポモドーロ (25分)</button>
                </div>
                <div id="timer-display" class="text-5xl font-mono font-bold text-slate-700 my-6">00:00:00</div>
                <div class="flex justify-center space-x-4">
                    <button id="btn-timer-start" onclick="toggleTimer()" class="w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xl shadow-md hover:bg-emerald-600 transition-all active:scale-95"><i class="fa-solid fa-play"></i></button>
                    <button onclick="resetTimer()" class="w-16 h-16 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-xl shadow-md hover:bg-slate-300 transition-all active:scale-95"><i class="fa-solid fa-rotate-left"></i></button>
                </div>
                <div id="timer-save-zone" class="mt-6 pt-4 border-t hidden">
                    <select id="timer-subject" class="w-full text-sm border rounded p-2 bg-slate-50 mb-2"></select>
                    <button onclick="saveTimerLog()" class="w-full bg-blue-500 text-white font-bold py-2 rounded-lg text-sm hover:bg-blue-600 transition-colors">この時間をタイムラインに記録</button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-book-bookmark mr-1 text-blue-500"></i>教材登録 & 計画</h3>
                <div class="space-y-2">
                    <input type="text" id="book-name" placeholder="参考書・教材名" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="book-pages" placeholder="総ページ・問題数" class="p-2 text-sm border rounded focus:ring-2 focus:ring-blue-400 focus:outline-none">
                        <input type="date" id="book-deadline" class="p-2 text-sm border rounded focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                    <div class="flex items-center space-x-2 border rounded p-2 bg-slate-50">
                        <i class="fa-solid fa-image text-slate-400 pl-1"></i>
                        <input type="file" id="book-image" accept="image/*" class="text-xs text-slate-600 file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 flex-1">
                    </div>
                    <button onclick="addBook()" class="w-full bg-slate-800 text-white text-sm font-bold py-2 rounded-lg hover:bg-slate-700 transition-colors">登録して目標ペースを計算</button>
                </div>
            </div>
            <p class="text-[11px] text-slate-400 text-center px-2"><i class="fa-solid fa-circle-info mr-1"></i>教材の写真をタップすると、その場で勉強時間をクイック記録できます！</p>
            <div id="books-list" class="space-y-3"></div>
        </div>

        <div id="tab-graph" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-chart-line mr-1 text-indigo-500"></i>模試偏差値の入力</h3>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="exam-name" placeholder="河合記述、駿台模試 など" class="p-2 text-sm border rounded focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                    <input type="number" step="0.1" id="exam-deviation" placeholder="偏差値 (例: 62.5)" class="p-2 text-sm border rounded focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                </div>
                <button onclick="addExamRecord()" class="w-full bg-indigo-500 text-white text-sm font-bold py-2 rounded-lg hover:bg-indigo-600 transition-colors">データを追加</button>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <canvas id="deviationChart" width="100%" height="70%"></canvas>
            </div>
            <div id="exam-list" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-2">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">登録済み模試一覧</h4>
                <div id="exam-list-items" class="divide-y divide-slate-100"></div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-3"><i class="fa-solid fa-tags mr-1 text-slate-500"></i>カテゴリ・教材名のカスタマイズ</h3>
                <p class="text-xs text-slate-500 mb-3">記録時のプルダウンで選べる項目を自由に追加・削除できます。</p>
                <div class="flex space-x-2 mb-4">
                    <input type="text" id="new-subject-name" placeholder="例: 過去問、整数問題集..." class="flex-1 p-2 text-sm border rounded focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    <button onclick="addCustomSubject()" class="bg-slate-800 text-white text-sm px-4 py-1 rounded-lg font-bold hover:bg-slate-700 transition-colors">追加</button>
                </div>
                <div id="settings-subject-list" class="space-y-2 border-t pt-3"></div>
            </div>
        </div>

    </main>

    <div id="quick-log-modal" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 shadow-xl space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-sm font-bold text-slate-800" id="modal-book-title">教材のクイック記録</h3>
                <button onclick="closeQuickLogModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="modal-book-preview" class="w-20 h-24 bg-slate-100 rounded mx-auto overflow-hidden shadow-sm hidden">
                <img id="modal-img" class="w-full h-full object-cover">
            </div>
            <div class="space-y-3">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 block mb-1">連動するカテゴリ</label>
                    <select id="modal-log-subject" class="w-full text-sm border rounded p-2 bg-slate-50"></select>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 block mb-1">勉強時間（分）</label>
                    <input type="number" id="modal-log-duration" placeholder="分単位で入力" class="w-full p-2 text-sm border rounded text-center font-bold focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 block mb-1">メモ・振り返り</label>
                    <textarea id="modal-log-comment" placeholder="解いた問題や振り返りなど..." class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-400 focus:outline-none" rows="2"></textarea>
                </div>
            </div>
            <div class="flex space-x-2 pt-2">
                <button onclick="closeQuickLogModal()" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">キャンセル</button>
                <button onclick="submitQuickLog()" class="flex-1 bg-blue-500 text-white py-2 rounded-xl text-sm font-bold hover:bg-blue-600 transition-colors shadow-md">タイムラインに記録</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 shadow-lg z-50 max-w-md mx-auto">
        <button onclick="switchTab('timeline')" id="nav-timeline" class="flex flex-col items-center space-y-1 text-blue-500 transition-colors w-1/5">
            <i class="fa-solid fa-list-ul text-xl"></i><span class="text-[10px] font-bold">記録</span>
        </button>
        <button onclick="switchTab('timer')" id="nav-timer" class="flex flex-col items-center space-y-1 text-slate-400 transition-colors w-1/5">
            <i class="fa-solid fa-stopwatch text-xl"></i><span class="text-[10px] font-bold">タイマー</span>
        </button>
        <button onclick="switchTab('plan')" id="nav-plan" class="flex flex-col items-center space-y-1 text-slate-400 transition-colors w-1/5">
            <i class="fa-solid fa-book text-xl"></i><span class="text-[10px] font-bold">計画</span>
        </button>
        <button onclick="switchTab('graph')" id="nav-graph" class="flex flex-col items-center space-y-1 text-slate-400 transition-colors w-1/5">
            <i class="fa-solid fa-chart-line text-xl"></i><span class="text-[10px] font-bold">成績</span>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center space-y-1 text-slate-400 transition-colors w-1/5">
            <i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] font-bold">設定</span>
        </button>
    </nav>

    <script>
        const SUBJECT_COLORS = ['bg-blue-500', 'bg-pink-500', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 'bg-cyan-600', 'bg-rose-500', 'bg-indigo-500'];

        let state = {
            logs: JSON.parse(localStorage.getItem('study_logs')) || [],
            books: JSON.parse(localStorage.getItem('study_books')) || [],
            exams: JSON.parse(localStorage.getItem('study_exams')) || [],
            subjects: JSON.parse(localStorage.getItem('study_subjects')) || [
                { id: 'math', name: '数学', color: 'bg-blue-500', text: 'Math' },
                { id: 'english', name: '英語', color: 'bg-pink-500', text: 'Eng' },
                { id: 'science', name: '理科', color: 'bg-emerald-500', text: 'Sci' }
            ]
        };

        let currentActiveBookId = null;

        function saveState() {
            try {
                localStorage.setItem('study_logs', JSON.stringify(state.logs));
                localStorage.setItem('study_books', JSON.stringify(state.books));
                localStorage.setItem('study_exams', JSON.stringify(state.exams));
                localStorage.setItem('study_subjects', JSON.stringify(state.subjects));
            } catch (e) {
                alert('ブラウザの保存容量制限を超えました！\n不要な教材を削除するか、右上のダウンロードボタンからデータを一度バックアップしてください。');
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `studylog_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData.logs && importedData.books) {
                        state = importedData;
                        if(!state.subjects) state.subjects = [{ id: 'math', name: '数学', color: 'bg-blue-500', text: 'Math' }];
                        saveState();
                        alert('データを復元しました！');
                        location.reload();
                    } else alert('対応していないファイルです。');
                } catch (err) { alert('読み込みに失敗しました。'); }
            };
            reader.readAsText(file);
        }

        window.onload = function() {
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('ja-JP', { month:'2-digit', day:'2-digit', weekday:'short' });
            populateSubjectSelects();
            renderTimeline();
            renderBooks();
            initChart();
            renderExamList();
            renderSettingsSubjects();
        };

        function renderSettingsSubjects() {
            const list = document.getElementById('settings-subject-list');
            list.innerHTML = state.subjects.map(s => `
                <div class="flex justify-between items-center p-2 bg-slate-50 border rounded text-sm">
                    <div class="flex items-center space-x-3">
                        <div class="w-4 h-4 rounded-full ${s.color} shadow-sm"></div>
                        <span class="text-slate-700 font-bold">${escapeHtml(s.name)}</span>
                    </div>
                    <button onclick="deleteCustomSubject('${s.id}')" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `).join('');
        }

        function addCustomSubject() {
            const input = document.getElementById('new-subject-name');
            const name = input.value.trim();
            if(!name) return alert('カテゴリ名を入力してください。');
            const color = SUBJECT_COLORS[state.subjects.length % SUBJECT_COLORS.length];
            state.subjects.push({ id: 'subj_' + Date.now(), name: name, color: color, text: name.substring(0, 3) });
            saveState();
            input.value = '';
            renderSettingsSubjects();
            populateSubjectSelects();
        }

        function deleteCustomSubject(id) {
            if(state.subjects.length <= 1) return alert('最低1つは残してください。');
            if(confirm('このカテゴリを削除しますか？')) {
                state.subjects = state.subjects.filter(s => s.id !== id);
                saveState();
                renderSettingsSubjects();
                populateSubjectSelects();
                renderTimeline();
            }
        }

        function populateSubjectSelects() {
            const optionsHtml = state.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            document.getElementById('log-subject').innerHTML = optionsHtml;
            document.getElementById('timer-subject').innerHTML = optionsHtml;
            document.getElementById('modal-log-subject').innerHTML = optionsHtml;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            const navIds = ['timeline', 'timer', 'plan', 'graph', 'settings'];
            navIds.forEach(id => {
                const el = document.getElementById(`nav-${id}`);
                if(id === tabId) { el.classList.remove('text-slate-400'); el.classList.add('text-blue-500'); }
                else { el.classList.remove('text-blue-500'); el.classList.add('text-slate-400'); }
            });
            if(tabId === 'graph' && chartInstance) chartInstance.update();
        }

        function renderTimeline() {
            const feed = document.getElementById('timeline-feed');
            if (state.logs.length === 0) {
                feed.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">まだ記録がありません。<br>記録を積み上げましょう。</div>`;
                return;
            }
            const sortedLogs = [...state.logs].sort((a,b) => b.timestamp - a.timestamp);
            feed.innerHTML = sortedLogs.map(log => {
                const subj = state.subjects.find(s => s.id === log.subjectId) || { name: '削除済み', color: 'bg-slate-400', text: 'Del' };
                const timeStr = new Date(log.timestamp).toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
                const hrs = Math.floor(log.duration / 60);
                const mins = log.duration % 60;
                const durationDisplay = hrs > 0 ? `${hrs}時間 ${mins}分` : `${mins}分`;

                return `
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 relative">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center space-x-2">
                                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white text-xs font-bold shadow-sm">Me</div>
                                <div>
                                    <div class="text-xs font-bold text-slate-700">自分</div>
                                    <div class="text-[10px] text-slate-400">${timeStr}</div>
                                </div>
                            </div>
                            <button onclick="deleteLog(${log.id})" class="text-slate-300 hover:text-red-400 text-xs p-1"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        ${log.comment ? `<p class="text-sm text-slate-700 mb-3 bg-blue-50/50 p-2 rounded-lg border border-blue-100/50">${escapeHtml(log.comment)}</p>` : ''}
                        <div class="border border-slate-100 rounded-xl p-3 flex items-center space-x-4 bg-slate-50/50">
                            ${log.bookImage ? `
                                <div class="w-12 h-16 rounded overflow-hidden shadow-sm aspect-[3/4] shrink-0">
                                    <img src="${log.bookImage}" class="w-full h-full object-cover">
                                </div>
                            ` : `
                                <div class="w-12 h-16 ${subj.color} rounded shadow-sm flex flex-col justify-between p-1.5 text-white text-[8px] font-bold aspect-[3/4] shrink-0">
                                    <span>${subj.text}</span><div class="w-full h-[2px] bg-white/40"></div>
                                </div>
                            `}
                            <div>
                                <div class="font-bold text-sm text-slate-800">${subj.name} ${log.bookName ? `<span class="text-xs text-slate-400 block font-normal mt-0.5">教材: ${escapeHtml(log.bookName)}</span>` : ''}</div>
                                <div class="text-slate-600 text-xs mt-1 flex items-center"><i class="fa-regular fa-clock mr-1 text-amber-500"></i><strong class="text-slate-800 text-sm ml-0.5">${durationDisplay}</strong></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addManualLog() {
            const commentEl = document.getElementById('log-comment');
            const subjEl = document.getElementById('log-subject');
            const durEl = document.getElementById('log-duration');
            const duration = parseInt(durEl.value);
            if(!duration || duration <= 0) return alert('時間を入力してください。');

            state.logs.push({ id: Date.now(), subjectId: subjEl.value, duration: duration, comment: commentEl.value.trim(), timestamp: Date.now(), bookName: null, bookImage: null });
            saveState(); renderTimeline(); commentEl.value = ''; durEl.value = '';
        }

        function deleteLog(id) {
            if(confirm('この記録を削除しますか？')) { state.logs = state.logs.filter(l => l.id !== id); saveState(); renderTimeline(); }
        }

        let timerInterval = null, timerMode = 'stopwatch', timerSeconds = 0, isTimerRunning = false;
        function setTimerMode(mode) {
            if(isTimerRunning) return;
            timerMode = mode;
            const btnSw = document.getElementById('btn-mode-sw'), btnPomo = document.getElementById('btn-mode-pomo');
            if(mode === 'stopwatch') {
                timerSeconds = 0;
                btnSw.className = "px-3 py-1 text-xs rounded-full font-bold bg-blue-500 text-white shadow-sm";
                btnPomo.className = "px-3 py-1 text-xs rounded-full font-bold bg-slate-100 text-slate-600 shadow-sm";
            } else {
                timerSeconds = 25 * 60;
                btnSw.className = "px-3 py-1 text-xs rounded-full font-bold bg-slate-100 text-slate-600 shadow-sm";
                btnPomo.className = "px-3 py-1 text-xs rounded-full font-bold bg-blue-500 text-white shadow-sm";
            }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const hrs = Math.floor(timerSeconds / 3600), mins = Math.floor((timerSeconds % 3600) / 60), secs = timerSeconds % 60;
            const timeString = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            document.getElementById('timer-display').innerText = timeString;
            document.title = isTimerRunning ? `(${timerMode === 'pomodoro' ? String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') : timeString}) My Study Log` : "My Study Log";
        }

        function toggleTimer() {
            const btn = document.getElementById('btn-timer-start');
            if(isTimerRunning) {
                clearInterval(timerInterval); isTimerRunning = false;
                btn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                btn.className = "w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xl shadow-md";
                if((timerMode === 'stopwatch' && timerSeconds > 10) || (timerMode === 'pomodoro' && timerSeconds === 0)) {
                    document.getElementById('timer-save-zone').classList.remove('hidden');
                }
                updateTimerDisplay();
            } else {
                isTimerRunning = true; document.getElementById('timer-save-zone').classList.add('hidden');
                btn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
                btn.className = "w-16 h-16 rounded-full bg-amber-500 text-white flex items-center justify-center text-xl shadow-md";
                timerInterval = setInterval(() => {
                    if(timerMode === 'stopwatch') { timerSeconds++; }
                    else {
                        if(timerSeconds > 0) { timerSeconds--; }
                        else {
                            clearInterval(timerInterval); isTimerRunning = false;
                            alert('ポモドーロセッション終了！');
                            timerSeconds = 25 * 60;
                            btn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                            btn.className = "w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xl shadow-md";
                            document.getElementById('timer-save-zone').classList.remove('hidden');
                        }
                    }
                    updateTimerDisplay();
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval); isTimerRunning = false;
            document.getElementById('btn-timer-start').innerHTML = `<i class="fa-solid fa-play"></i>`;
            document.getElementById('btn-timer-start').className = "w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xl shadow-md";
            document.getElementById('timer-save-zone').classList.add('hidden');
            setTimerMode(timerMode);
        }

        function saveTimerLog() {
            let loggedMinutes = timerMode === 'stopwatch' ? Math.max(1, Math.round(timerSeconds / 60)) : 25;
            state.logs.push({ id: Date.now(), subjectId: document.getElementById('timer-subject').value, duration: loggedMinutes, comment: timerMode === 'pomodoro' ? 'ポモドーロ完了！' : 'タイマー計測', timestamp: Date.now(), bookName: null, bookImage: null });
            saveState(); renderTimeline(); resetTimer(); switchTab('timeline');
        }

        function renderBooks() {
            const list = document.getElementById('books-list');
            if (state.books.length === 0) return list.innerHTML = `<div class="text-center py-6 text-slate-400 text-xs">登録されている教材計画はありません。</div>`;

            list.innerHTML = state.books.map(book => {
                const today = new Date(), deadline = new Date(book.deadline);
                const daysLeft = Math.ceil((deadline.getTime() - today.getTime()) / (1000 * 3600 * 24));
                const remainingPages = Math.max(0, book.totalPages - (book.currentPages || 0));
                let dailyPace = (daysLeft > 0 && remainingPages > 0) ? (remainingPages / daysLeft).toFixed(1) : remainingPages;
                const progressPercent = Math.min(100, Math.round(((book.currentPages || 0) / book.totalPages) * 100));

                return `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                        <div class="flex space-x-3 items-start">
                            <div onclick="openQuickLogModal(${book.id})" class="w-14 h-18 bg-slate-100 rounded border border-slate-200 shadow-sm overflow-hidden flex flex-col items-center justify-center cursor-pointer hover:opacity-80 transition-opacity active:scale-95 shrink-0 aspect-[3/4]" title="タップしてクイック記録">
                                ${book.image ? `<img src="${book.image}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-book text-slate-300 text-lg mb-1"></i><span class="text-[8px] text-slate-400 text-center font-bold px-1 leading-tight">タップで<br>記録</span>`}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    <h4 onclick="openQuickLogModal(${book.id})" class="font-bold text-sm text-slate-800 truncate cursor-pointer hover:text-blue-500">${escapeHtml(book.name)}</h4>
                                    <button onclick="deleteBook(${book.id})" class="text-slate-300 hover:text-red-400 text-xs pl-2"><i class="fa-solid fa-trash"></i></button>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-0.5">期限: ${book.deadline} (${daysLeft > 0 ? `あと ${daysLeft} 日` : '期限超過'})</p>
                                <div class="mt-2">
                                    <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1"><span>進捗: ${book.currentPages || 0} / ${book.totalPages} P</span><span>${progressPercent}%</span></div>
                                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div class="bg-blue-500 h-full" style="width: ${progressPercent}%"></div></div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-2 rounded-lg flex justify-between items-center text-xs">
                            <span class="text-slate-500 font-medium"><i class="fa-solid fa-bolt text-amber-500 mr-1"></i>目標ペース:</span>
                            <span class="font-bold text-slate-800">${remainingPages === 0 ? '🎉 完了！' : `1日あたり ${dailyPace} P`}</span>
                        </div>
                        <div class="flex items-center space-x-2 pt-1">
                            <input type="number" id="update-page-${book.id}" placeholder="現在P" class="text-xs border rounded px-2 py-1 w-20 text-center" value="${book.currentPages || 0}">
                            <button onclick="updateBookProgress(${book.id})" class="bg-slate-200 text-slate-700 font-bold text-xs px-3 py-1 rounded hover:bg-slate-300 flex-1">進捗を更新</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 📸 画像自動リサイズ・圧縮ロジック ---
        function addBook() {
            const nameEl = document.getElementById('book-name');
            const pagesEl = document.getElementById('book-pages');
            const deadlineEl = document.getElementById('book-deadline');
            const imageEl = document.getElementById('book-image');

            if(!nameEl.value || !pagesEl.value || !deadlineEl.value) return alert('必要項目を入力してください。');

            const file = imageEl.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        // スマホの巨大な写真を、アプリ表示に最適な横幅300pxに自動縮小
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300;
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        // 画質を少し落としてデータサイズを1/50程度に激しく軽量化 (画質0.6)
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        saveBookData(nameEl.value.trim(), parseInt(pagesEl.value), deadlineEl.value, compressedBase64);
                        imageEl.value = '';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                saveBookData(nameEl.value.trim(), parseInt(pagesEl.value), deadlineEl.value, null);
            }

            function saveBookData(name, totalPages, deadline, imageData) {
                state.books.push({ id: Date.now(), name: name, totalPages: totalPages, currentPages: 0, deadline: deadline, image: imageData });
                saveState(); renderBooks();
                nameEl.value = ''; pagesEl.value = ''; deadlineEl.value = '';
            }
        }

        function updateBookProgress(id) {
            const input = document.getElementById(`update-page-${id}`), book = state.books.find(b => b.id === id);
            if(book && input) {
                const val = parseInt(input.value);
                if(val >= 0 && val <= book.totalPages) { book.currentPages = val; saveState(); renderBooks(); }
                else alert('正しい範囲を入力してください。');
            }
        }

        function deleteBook(id) {
            if(confirm('この教材を削除しますか？')) { state.books = state.books.filter(b => b.id !== id); saveState(); renderBooks(); }
        }
